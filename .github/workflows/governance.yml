name: UIDT Repository Governance

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  enforce-governance:
    name: Enforce UIDT Constitution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Check branch protection rules
        run: |
          if [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/main" ]; then
            # Verify if this push was a merge from Opus 4.7
            # Note: We rely on GitHub branch protection settings for hard enforcement.
            # This step adds visibility in the action logs.
            commit_message=$(git log -1 --pretty=%B)
            if [[ "$commit_message" == *"Merge pull request"* ]]; then
              echo "✅ Merge to main detected. Ensuring compliance with Opus 4.7 merge authority rule."
            else
              echo "⚠️  WARNING: Direct push to main detected. This violates the UIDT Constitution."
              echo "Only PR merges by Opus 4.7 are authorized."
              exit 1
            fi
          fi
          
      - name: Check Protected Paths
        if: github.event_name == 'pull_request'
        run: |
          # Fetch the changes
          git fetch origin ${{ github.base_ref }}
          changed_files=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          
          # Check for forbidden modifications to protected files unless authorized
          forbidden=0
          for file in $changed_files; do
            if [[ "$file" == "CANONICAL/"* ]] || [[ "$file" == "LEDGER/"* ]] || [[ "$file" == "SECURITY.md" ]]; then
              echo "⚠️  Modification to protected path detected: $file"
              echo "This requires explicit PI / Opus 4.7 authorization."
            fi
          done
