name: Nightly Reproducibility

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-reproducibility:
    name: Build and Verify Docker Container
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: uidt-framework:test
          
      - name: Run test suite in container
        run: |
          docker run --rm uidt-framework:test pytest verification/tests/ -v --tb=short
