name: UIDT Continuous Integration
on:
  push:
    branches: [ main, "feature/*" ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test-verification-suite:
    name: Run Mathematical Verification
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.11']
      fail-fast: false
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-benchmark
          
      - name: Verify mpmath precision
        run: |
          python -c "import mpmath as mp; assert mp.dps == 80, 'Precision breach detected! mp.dps is not 80.'"
          
      - name: Run verification suite
        run: |
          pytest verification/tests/ -v --tb=short

  security-lint:
    name: Actionlint & CodeQL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Run actionlint
        uses: raven-actions/actionlint@v2
