name: Elite CI/CD Pipeline

on:
  push:
    branches:
      - 'TKT-*'

permissions:
  contents: read
  id-token: write # required for SLSA provenance

jobs:
  verify:
    name: Verify Infrastructure & Physics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mpmath pytest

      - name: Run Epistemic Linter
        run: python verification/scripts/epistemic_linter.py

      - name: Run Performance Regression Check (Banach)
        run: python verification/tests/test_performance_regression.py

      - name: Build Artifacts
        run: |
          mkdir -p dist
          echo "Verified artifacts" > dist/verified.txt
          # Additional build steps would go here

      - name: Generate Subjects
        id: subjects
        run: |
          cd dist
          sha256sum * > ../subjects.txt
          cd ..
          BASE64_SUBJECTS=$(base64 -w0 subjects.txt)
          echo "base64_subjects=$BASE64_SUBJECTS" >> $GITHUB_OUTPUT

    outputs:
      base64_subjects: ${{ steps.subjects.outputs.base64_subjects }}

  provenance:
    needs: [verify]
    name: Generate SLSA-3 Provenance
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: "${{ needs.verify.outputs.base64_subjects }}"
