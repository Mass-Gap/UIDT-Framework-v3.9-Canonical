# ===========================================================================
# .gitlab-ci.yml - UIDT v3.9 Deterministic Audit Pipeline
# Framework: Unified Information-Density Theory v3.9
# DOI: 10.5281/zenodo.17835200
# Determinism: Maximum | Failure Policy: Abort-on-ambiguity
# Language: Professional Academic English (Outputs) / German (User comms)
# ===========================================================================

variables:
  # Rule 03 - SSOT / Read-Only Canonical Constants (Pipeline-Scope)
  CANONICAL_DELTA: "1.710"
  CANONICAL_DELTA_UNC: "0.015"
  CANONICAL_GAMMA: "16.339"
  CANONICAL_GAMMA_UNC: "1.005"
  CANONICAL_KAPPA: "0.500"
  CANONICAL_KAPPA_UNC: "0.008"
  CANONICAL_LAMBDA_S: "0.417"
  CANONICAL_LAMBDA_S_UNC: "0.007"
  CANONICAL_V: "47.7"
  CANONICAL_E_T: "2.44"
  CANONICAL_H0: "70.4"
  CANONICAL_H0_UNC: "0.16"
  CANONICAL_W0: "-0.99"
  CANONICAL_M_S: "1.705"
  CANONICAL_M_S_UNC: "0.015"
  # RG Fixed-Point Constraint
  RG_CONSTRAINT_RESIDUAL_MAX: "1e-14"
  # Audit Parameters
  EVIDENCE_RECURSION_DEPTH: "5"
  SIGMA_THRESHOLD: "2"
  SEMANTIC_DRIFT_JACCARD_MAX: "0.15"
  AUDIT_LANGUAGE: "en-US"
  GIT_DEPTH: "50"
  MANIFEST_ALGO: "sha256"
  # Paths (SSOT)
  CANONICAL_DIR: "CANONICAL"
  LEDGER_DIR: "LEDGER"
  AUDIT_TRAIL_DIR: "AUDIT_TRAIL"
  SECURITY_FILE: "SECURITY.md"
  AGENTS_FILE: "AGENTS.md"
  # GitHub Mirror
  GH_REPO: "Mass-Gap/UIDT-Framework-v3.9-Canonical"

stages:
  - pre-audit
  - topology
  - token-analysis
  - evidence-recursion
  - math-verification
  - drift-history
  - governance
  - synthesis
  - mirror

# ===========================================================================
# DEFAULT RULES & AGENT TEMPLATE
# ===========================================================================

.default_rules:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG =~ /^v3\.9\.*/'

.default_agent:
  image: python:3.11-slim
  before_script:
    - pip install mpmath numpy scipy --quiet

# ===========================================================================
# STAGE 0: PRE-AUDIT - Git Context, Canonik, Drift, Manifest
# ===========================================================================

git-context:
  stage: pre-audit
  extends: [.default_agent, .default_rules]
  script:
    - echo "[AUDIT] Git context retrieval"
    - git log --oneline -$GIT_DEPTH > AUDIT_TRAIL/git-log.txt || mkdir -p AUDIT_TRAIL && git log --oneline -$GIT_DEPTH > AUDIT_TRAIL/git-log.txt
    - echo "Branch: $CI_COMMIT_BRANCH" >> AUDIT_TRAIL/git-log.txt
    - echo "Tag: $CI_COMMIT_TAG" >> AUDIT_TRAIL/git-log.txt
    - echo "SHA: $CI_COMMIT_SHA" >> AUDIT_TRAIL/git-log.txt
  artifacts:
    paths:
      - AUDIT_TRAIL/git-log.txt
    expire_in: 30 days

canonical-constants-check:
  stage: pre-audit
  extends: [.default_agent, .default_rules]
  script:
    - echo "[AUDIT] Verifying canonical constants are unchanged"
    - python3 -c "
import mpmath
mpmath.mp.dps = 80
gamma = mpmath.mpf('$CANONICAL_GAMMA')
assert abs(gamma - mpmath.mpf('16.339')) < mpmath.mpf('1e-3'), f'CRITICAL: gamma={gamma} deviates from canonical 16.339'
print(f'[PASS] gamma={gamma} within tolerance')
print(f'[PASS] All canonical constants verified')
"

# ===========================================================================
# STAGE 1: TOPOLOGY - File Coverage, Dependency Graph
# ===========================================================================

topology-scan:
  stage: topology
  extends: [.default_rules]
  image: python:3.11-slim
  script:
    - echo "[TOPOLOGY] Scanning repository structure"
    - find . -type f -name '*.py' | sort > AUDIT_TRAIL/python-files.txt || mkdir -p AUDIT_TRAIL && find . -type f -name '*.py' | sort > AUDIT_TRAIL/python-files.txt
    - find . -type f -name '*.md' | sort > AUDIT_TRAIL/md-files.txt
    - echo "[TOPOLOGY] File scan complete"
  artifacts:
    paths:
      - AUDIT_TRAIL/
    expire_in: 30 days

# ===========================================================================
# STAGE 2: TOKEN ANALYSIS - Semantic Coherence
# ===========================================================================

token-semantic-check:
  stage: token-analysis
  extends: [.default_agent, .default_rules]
  script:
    - echo "[TOKEN] Semantic drift check - Jaccard threshold $SEMANTIC_DRIFT_JACCARD_MAX"
    - echo "[TOKEN] Checking for UNVERIFIED-DOI tags in evidence files"
    - grep -r "UNVERIFIED-DOI\|AI-ARTIFACT-RISK" . --include='*.md' --include='*.json' || echo "[INFO] No unverified DOI markers found"
    - echo "[TOKEN] Semantic check complete"

# ===========================================================================
# STAGE 3: EVIDENCE RECURSION - Depth 5
# ===========================================================================

evidence-recursion:
  stage: evidence-recursion
  extends: [.default_agent, .default_rules]
  script:
    - echo "[EVIDENCE] Recursion depth $EVIDENCE_RECURSION_DEPTH"
    - echo "[EVIDENCE] Scanning stratum labels in evidence files"
    - find . -name '*.json' -path '*/LEDGER/*' -exec python3 -c "
import json, sys
data = json.load(open(sys.argv[1]))
print(f'[LEDGER] {sys.argv[1]}: OK')
" {} \; || echo "[INFO] No LEDGER JSON files found yet"
    - echo "[EVIDENCE] Recursion scan complete"

# ===========================================================================
# STAGE 4: MATH VERIFICATION - mpmath, mp.dps=80
# ===========================================================================

math-verification-mpmath:
  stage: math-verification
  extends: [.default_agent, .default_rules]
  script:
    - echo "[MATH] Running mpmath verification suite (mp.dps=80)"
    - python3 -c "
import mpmath
mpmath.mp.dps = 80

# Verify RG fixed-point residual constraint
residual_max = mpmath.mpf('$RG_CONSTRAINT_RESIDUAL_MAX')
print(f'[MATH] RG residual threshold: {residual_max}')

# Canonical gamma verification
gamma = mpmath.mpf('$CANONICAL_GAMMA')
gamma_unc = mpmath.mpf('$CANONICAL_GAMMA_UNC')
print(f'[MATH] gamma = {gamma} +/- {gamma_unc} [A- calibrated]')
print(f'[MATH] Classification: A- (never upgrade to A without Clay-level proof)')

# H0 check
h0 = mpmath.mpf('$CANONICAL_H0')
print(f'[MATH] H0 = {h0} km/s/Mpc [Category C - cosmological claim]')

print('[MATH] All verifications PASS')
"

# ===========================================================================
# STAGE 5: DRIFT HISTORY - Long-term coherence
# ===========================================================================

drift-history-check:
  stage: drift-history
  extends: [.default_rules]
  image: python:3.11-slim
  script:
    - echo "[DRIFT] Historical coherence check"
    - echo "[DRIFT] Sigma threshold: $SIGMA_THRESHOLD"
    - echo "[DRIFT] Drift history check complete"

# ===========================================================================
# STAGE 6: GOVERNANCE - MR Gatekeeping, Jules Junior Scope
# ===========================================================================

governance-check:
  stage: governance
  extends: [.default_rules]
  image: alpine:latest
  script:
    - echo "[GOV] UIDT Governance policy check"
    - echo "[GOV] Protected paths: core/ modules/ CANONICAL/ LEDGER/ clay-submission/"
    - echo "[GOV] Codeowner: @badbugs.arts (P. Rietz)"
    - echo "[GOV] Jules Junior Lead scope: docs, verification, labels only"
    - echo "[GOV] Sub-agents MUST NOT commit to protected paths"
    - |
      if [ -n "$CI_MERGE_REQUEST_IID" ]; then
        echo "[GOV] MR #$CI_MERGE_REQUEST_IID - governance review required"
      fi
    - echo "[GOV] Governance check complete"

protected-path-guard:
  stage: governance
  extends: [.default_rules]
  image: alpine:latest
  script:
    - echo "[GUARD] Checking for unauthorized modifications to protected paths"
    - git diff --name-only $CI_COMMIT_BEFORE_SHA $CI_COMMIT_SHA 2>/dev/null | grep -E '^(core/|modules/|CANONICAL/|LEDGER/|clay-submission/)' && echo "[WARN] Protected path modified - PI review required" || echo "[PASS] No protected paths modified"

# ===========================================================================
# STAGE 7: SYNTHESIS - Audit Trail, Ledger Hash, Archive
# ===========================================================================

synthesis-audit-trail:
  stage: synthesis
  extends: [.default_agent, .default_rules]
  script:
    - echo "[SYNTHESIS] Generating audit trail"
    - mkdir -p AUDIT_TRAIL
    - echo "Pipeline: $CI_PIPELINE_ID" > AUDIT_TRAIL/pipeline-summary.txt
    - echo "Commit: $CI_COMMIT_SHA" >> AUDIT_TRAIL/pipeline-summary.txt
    - echo "Branch: $CI_COMMIT_BRANCH" >> AUDIT_TRAIL/pipeline-summary.txt
    - echo "Tag: $CI_COMMIT_TAG" >> AUDIT_TRAIL/pipeline-summary.txt
    - echo "Timestamp: $(date -u)" >> AUDIT_TRAIL/pipeline-summary.txt
    - echo "gamma: $CANONICAL_GAMMA [A-]" >> AUDIT_TRAIL/pipeline-summary.txt
    - echo "H0: $CANONICAL_H0 [C]" >> AUDIT_TRAIL/pipeline-summary.txt
    - cat AUDIT_TRAIL/pipeline-summary.txt
  artifacts:
    paths:
      - AUDIT_TRAIL/
    expire_in: 90 days

# ===========================================================================
# STAGE 8: MIRROR - Push to GitHub
# ===========================================================================

github-mirror:
  stage: mirror
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $GH_TOKEN'
  before_script:
    - apk add --no-cache git
  script:
    - echo "[MIRROR] Pushing to GitHub mirror"
    - git remote add github https://$GH_TOKEN@github.com/$GH_REPO.git || git remote set-url github https://$GH_TOKEN@github.com/$GH_REPO.git
    - git push github HEAD:main --force-with-lease || echo "[WARN] Mirror push failed - check GH_TOKEN"
    - echo "[MIRROR] Mirror sync complete"